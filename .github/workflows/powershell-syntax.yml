name: PowerShell Syntax Check

on:
  push:
    branches: [master, main]
    paths:
      - '**/*.ps1'
  pull_request:
    branches: [master, main]
    paths:
      - '**/*.ps1'
  workflow_dispatch:

jobs:
  validate-syntax:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $hasErrors = $false
          $files = Get-ChildItem -Path "${{ github.workspace }}" -Filter *.ps1 -Recurse

          if ($files.Count -eq 0) {
            Write-Host "::warning::No .ps1 files found"
            exit 0
          }

          foreach ($file in $files) {
            $errors = @()
            $null = [System.Management.Automation.Language.Parser]::ParseFile(
              $file.FullName,
              [ref]$null,
              [ref]$errors
            )

            if ($errors.Count -gt 0) {
              $hasErrors = $true
              Write-Host "::group::$($file.Name)"
              Write-Host "❌ $($file.Name) — $($errors.Count) error(s)"
              Write-Host ""

              foreach ($e in $errors) {
                $line = $e.Extent.StartLineNumber
                $col  = $e.Extent.StartColumnNumber
                $msg  = $e.Message -replace "`n|`r", " "
                Write-Host "::error file=$($file.Name),line=$line,col=$col::$msg"
                Write-Host "  Line $line, Col $col — $msg"
              }

              Write-Host "::endgroup::"
            } else {
              Write-Host "✅ $($file.Name) — syntax OK"
            }
          }

          if ($hasErrors) {
            Write-Host ""
            Write-Host "❌ One or more files have syntax errors."
            exit 1
          }

          Write-Host ""
          Write-Host "✅ All files passed syntax validation."

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -AllowClobber -SkipPublisherCheck
          Write-Host "✅ PSScriptAnalyzer installed: $(Get-Module -Name PSScriptAnalyzer -ListAvailable | Select-Object -ExpandProperty Version)"

      - name: Run PSScriptAnalyzer lint
        shell: pwsh
        run: |
          $hasErrors = $false
          $files = Get-ChildItem -Path "${{ github.workspace }}" -Filter *.ps1 -Recurse

          if ($files.Count -eq 0) {
            Write-Host "::warning::No .ps1 files found"
            exit 0
          }

          foreach ($file in $files) {
            Write-Host "::group::$($file.Name)"

            $results = Invoke-ScriptAnalyzer -Path $file.FullName -Severity Error, Warning

            if ($results.Count -gt 0) {
              $hasErrors = $true
              Write-Host "🔍 $($file.Name) — $($results.Count) issue(s)"
              Write-Host ""

              $ruleCount = @{}
              foreach ($r in $results) {
                $key = "$($r.ScriptName):$($r.Line)"
                if (-not $ruleCount.ContainsKey($key)) {
                  $ruleCount[$key] = $true
                  $sev = $r.Severity.ToString().ToLower()
                  $msg = $r.Message -replace "`n|`r", " "
                  $ann = if ($sev -eq 'error') { 'error' } else { 'warning' }
                  Write-Host "::$ann file=$($file.Name),line=$($r.Line),col=$($r.Column)::$msg"
                  Write-Host "  [$($r.Severity)] $msg"
                  Write-Host "          Rule: $($r.RuleName) — Line $($r.Line), Col $($r.Column)"
                  Write-Host ""
                }
              }
            } else {
              Write-Host "✅ $($file.Name) — lint OK"
            }

            Write-Host "::endgroup::"
          }

          if ($hasErrors) {
            Write-Host ""
            Write-Host "❌ PSScriptAnalyzer found issues. Check annotations above."
            exit 1
          }

          Write-Host ""
          Write-Host "✅ PSScriptAnalyzer: all files passed lint."
